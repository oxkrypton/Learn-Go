name: PR AI Review

on:
  workflow_run:
    workflows: ["Go CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
    - name: Resolve PR from workflow run
      id: pr
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      run: |
        pr_json="$(gh api \
          -H "Accept: application/vnd.github+json" \
          "repos/${REPO}/commits/${HEAD_SHA}/pulls" | jq '.[0]')"

        pr_number="$(printf '%s' "$pr_json" | jq -r '.number // empty')"
        if [ -z "$pr_number" ]; then
          echo "No pull request found for commit ${HEAD_SHA}"
          exit 1
        fi

        pr_title="$(printf '%s' "$pr_json" | jq -r '.title // ""')"
        pr_body="$(printf '%s' "$pr_json" | jq -r '.body // ""')"
        pr_url="$(printf '%s' "$pr_json" | jq -r '.html_url // ""')"

        gh api \
          -H "Accept: application/vnd.github.v3.diff" \
          "repos/${REPO}/pulls/${pr_number}" > pr.diff

        {
          echo "number=${pr_number}"
          echo "title<<EOF"
          echo "$pr_title"
          echo "EOF"
          echo "body_text<<EOF"
          echo "$pr_body"
          echo "EOF"
          echo "url=${pr_url}"
          echo "diff<<EOF"
          sed -n '1,1200p' pr.diff
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Ask DeepSeek for review
      id: review
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        PR_TITLE: ${{ steps.pr.outputs.title }}
        PR_BODY: ${{ steps.pr.outputs.body_text }}
        PR_URL: ${{ steps.pr.outputs.url }}
        PR_DIFF: ${{ steps.pr.outputs.diff }}
      run: |
        jq -n \
          --arg title "$PR_TITLE" \
          --arg body "$PR_BODY" \
          --arg url "$PR_URL" \
          --arg diff "$PR_DIFF" \
          '{
            model: "deepseek-chat",
            temperature: 0.2,
            messages: [
              {
                role: "system",
                content: "You are reviewing a GitHub pull request. Focus only on the actual code changes. Be careful, specific, and concise. If the diff is too small or harmless, say so. Do not praise. Do not invent files or problems. Reply in simplified Chinese using markdown."
              },
              {
                role: "user",
                content: ("请审查这个 GitHub Pull Request，并输出固定结构：\n" +
                  "## 总体判断\n" +
                  "一句话总结风险等级。\n\n" +
                  "## 主要风险\n" +
                  "如果没有明显风险，写“未发现明显高风险问题”。\n\n" +
                  "## 建议补充验证\n" +
                  "给出 1 到 3 条最值得补的验证点。\n\n" +
                  "## 是否建议合并\n" +
                  "只写：建议合并 / 修改后再合并。\n\n" +
                  "PR 标题：\n" + $title + "\n\n" +
                  "PR 描述：\n" + $body + "\n\n" +
                  "PR 链接：\n" + $url + "\n\n" +
                  "Diff 如下：\n" + $diff)
              }
            ]
          }' > request.json

        curl -sS https://api.deepseek.com/v1/chat/completions \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${OPENAI_API_KEY}" \
          --data @request.json > response.json

        review_body=$(jq -r '.choices[0].message.content // empty' response.json)
        if [ -z "$review_body" ]; then
          echo "DeepSeek response:"
          cat response.json
          exit 1
        fi

        {
          echo "body<<EOF"
          echo "<!-- ai-pr-review -->"
          echo "## AI 审查结果"
          echo
          echo "$review_body"
          echo
          echo "---"
          echo "模型：DeepSeek"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create or update PR comment
      uses: actions/github-script@v7
      env:
        REVIEW_BODY: ${{ steps.review.outputs.body }}
      with:
        github-token: ${{ github.token }}
        script: |
          const marker = '<!-- ai-pr-review -->';
          const body = process.env.REVIEW_BODY;
          const issue_number = Number('${{ steps.pr.outputs.number }}');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number,
            per_page: 100,
          });

          const existing = comments.find(comment =>
            comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
          }
