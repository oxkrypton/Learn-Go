name: Deploy Go-redis

on:
  push:
    branches: ["main"]
    paths:
      - "Go-redis/**"

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.24"
        cache: true
        cache-dependency-path: Go-redis/go.mod

    - name: Build Linux binary
      working-directory: Go-redis
      run: |
        mkdir -p bin
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -o bin/hmdp-server ./cmd

    - name: Upload deploy artifact
      id: artifact
      uses: actions/upload-artifact@v4
      with:
        name: hmdp-server-deploy-linux-amd64
        path: Go-redis/bin/hmdp-server

    - name: Run remote deploy script
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          set -e
          cd /opt/go-redis-deploy
          rm -f hmdp-server.new hmdp-server.zip
          curl -fsSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -o hmdp-server.zip \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${{ steps.artifact.outputs.artifact-id }}/zip"
          unzip -o hmdp-server.zip
          mv -f hmdp-server hmdp-server.new
          chmod +x /opt/go-redis-deploy/deploy.sh
          /opt/go-redis-deploy/deploy.sh /opt/go-redis-deploy/hmdp-server.new
