name: Deploy Go-redis

on:
  push:
    branches: ["main"]
    paths:
      - "Go-redis/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.24"
        cache: true
        cache-dependency-path: Go-redis/go.mod

    - name: Build Linux binary
      working-directory: Go-redis
      run: |
        mkdir -p bin
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -o bin/hmdp-server ./cmd

    - name: Upload deploy artifact
      uses: actions/upload-artifact@v4
      with:
        name: hmdp-server-deploy-linux-amd64
        path: Go-redis/bin/hmdp-server

    - name: Copy binary to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: Go-redis/bin/hmdp-server
        target: /tmp
        strip_components: 2

    - name: Run remote deploy script
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          set -e
          if [ ! -x /opt/go-redis-deploy/deploy.sh ]; then
            echo "deploy.sh not found or not executable: /opt/go-redis-deploy/deploy.sh"
            exit 1
          fi
          /opt/go-redis-deploy/deploy.sh /tmp/hmdp-server
