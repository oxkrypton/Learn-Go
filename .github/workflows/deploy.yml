name: Deploy Go-redis

on:
  push:
    branches: ["main"]
    paths:
      - "Go-redis/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.24"
        cache: true
        cache-dependency-path: Go-redis/go.mod

    - name: Build Linux binary
      working-directory: Go-redis
      run: |
        mkdir -p bin
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -o bin/hmdp-server ./cmd

    - name: Upload deploy artifact
      uses: actions/upload-artifact@v4
      with:
        name: hmdp-server-deploy-linux-amd64
        path: Go-redis/bin/hmdp-server

    - name: Set up SSH key
      env:
        SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

    - name: Copy binary to server
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        SERVER_PORT: ${{ secrets.SERVER_PORT }}
      run: |
        ssh \
          -i ~/.ssh/deploy_key \
          -p "$SERVER_PORT" \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ConnectTimeout=30 \
          -o BatchMode=yes \
          "${SERVER_USER}@${SERVER_HOST}" \
          'cat > /opt/go-redis-deploy/hmdp-server.new' < Go-redis/bin/hmdp-server

    - name: Run remote deploy script
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        SERVER_PORT: ${{ secrets.SERVER_PORT }}
      run: |
        ssh \
          -i ~/.ssh/deploy_key \
          -p "$SERVER_PORT" \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ConnectTimeout=30 \
          "${SERVER_USER}@${SERVER_HOST}" \
          'set -e
          chmod +x /opt/go-redis-deploy/deploy.sh
          /opt/go-redis-deploy/deploy.sh /opt/go-redis-deploy/hmdp-server.new'
