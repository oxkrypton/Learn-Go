worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    
    keepalive_timeout  65;

    # 后端服务节点池。
    # Nginx 默认按轮询(round robin)方式做负载均衡。
    upstream hmdp_backend {
        server host.docker.internal:8080 weight=1 max_fails=3 fail_timeout=30s;
        server host.docker.internal:8082 weight=1 max_fails=3 fail_timeout=30s;
        # server host.docker.internal:8083 weight=1 max_fails=3 fail_timeout=30s;
    }

    server {
        listen       80;
        server_name  localhost;

        # 1. 静态资源托管：将根路径映射到 hmdp 文件夹
        location / {
            root   /usr/share/nginx/html/hmdp;
            index  index.html index.htm;
        }

        # 2. 反向代理：拦截 /api/ 开头的请求，转发给后端节点池
        location /api/ {
            proxy_pass http://hmdp_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 错误页面路由
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
